<div class="sxxk-container">

  <!-- ── TOOLBAR ───────────────────────────────────────────────── -->
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="page-title"><i class="material-icons">inventory_2</i> SXXK</span>

      <select class="sel" [(ngModel)]="yearFilter" (change)="filterRows()">
        <option *ngFor="let y of years" [value]="y">{{y}}</option>
      </select>
      <select class="sel" [(ngModel)]="monthFilter" (change)="filterRows()">
        <option *ngFor="let m of months" [value]="m.value">{{m.label}}</option>
      </select>

      <input class="search-input" placeholder="🔍 Tìm Mã NVL..."
             [(ngModel)]="searchTerm" (input)="filterRows()" />
    </div>

    <div class="toolbar-right">
      <span class="saved-msg" *ngIf="savedMsg">{{savedMsg}}</span>

      <!-- Import/Template – chỉ hiện khi tab có importKey -->
      <ng-container *ngIf="activeTab.importKey">
        <label class="btn btn-import">
          <i class="material-icons">upload_file</i> Import {{activeTab.label}}
          <input type="file" accept=".xlsx,.xls" hidden
                 (change)="onFileSelected($event, activeTab.importKey!)" />
        </label>
        <button class="btn btn-tpl" (click)="downloadTemplate(activeTab.importKey!)">
          <i class="material-icons">download</i> Mẫu
        </button>
      </ng-container>

      <button class="btn btn-export" (click)="exportExcel()">
        <i class="material-icons">download</i> Xuất Excel
      </button>
    </div>
  </div>

  <!-- ── TABS ──────────────────────────────────────────────────── -->
  <div class="tab-bar">
    <button *ngFor="let t of tabs"
            class="tab-btn"
            [class.active]="activeTabKey === t.key"
            (click)="activeTabKey = t.key">
      <i class="material-icons">{{t.icon}}</i>
      <span>{{t.label}}</span>
    </button>
  </div>

  <!-- ── LOADING ────────────────────────────────────────────────── -->
  <div class="loading" *ngIf="isLoading">
    <div class="spinner"></div> Đang xử lý...
  </div>

  <!-- ── BẢNG ──────────────────────────────────────────────────── -->
  <div class="table-wrap">
    <table class="excel-table">
      <thead>
        <tr>
          <ng-container *ngFor="let col of activeTab.columns">
            <th *ngIf="col.field === 'stt'"    class="col-stt"   [style.background]="col.color || ''">STT</th>
            <th *ngIf="col.field === 'maNVL'"  class="col-ma"    [style.background]="col.color || ''">Mã NVL</th>
            <th *ngIf="col.field === 'action'" class="col-action"></th>
            <th *ngIf="col.field !== 'stt' && col.field !== 'maNVL' && col.field !== 'action'"
                class="col-num"
                [style.background]="col.color || '#e8eaf6'">
              {{col.header}}
            </th>
          </ng-container>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of filteredRows; let i = index"
            [class.row-diff]="r.ssBCTK !== 0">
          <ng-container *ngFor="let col of activeTab.columns">
            <!-- STT -->
            <td *ngIf="col.field === 'stt'" class="col-stt">{{i + 1}}</td>
            <!-- Mã NVL -->
            <td *ngIf="col.field === 'maNVL'" class="col-ma">{{r.maNVL}}</td>
            <!-- Action -->
            <td *ngIf="col.field === 'action'" class="col-action">
              <button class="del-btn" (click)="deleteRow(r)" title="Xóa">
                <i class="material-icons">delete</i>
              </button>
            </td>
            <!-- Số -->
            <td *ngIf="col.field !== 'stt' && col.field !== 'maNVL' && col.field !== 'action'"
                class="col-num"
                [class.col-result]="isResult(col.field)"
                [class.ss-diff]="isSsBCTK(col.field) && r.ssBCTK !== 0"
                [class.ss-ok]="isSsBCTK(col.field) && r.ssBCTK === 0">
              {{cellValue(r, col.field)}}
            </td>
          </ng-container>
        </tr>

        <!-- Hàng tổng -->
        <tr class="total-row" *ngIf="filteredRows.length > 0">
          <ng-container *ngFor="let col of activeTab.columns; let ci = index">
            <td *ngIf="col.field === 'stt' && ci === 0" class="col-stt" colspan="2">
              Tổng ({{totalRows}})
            </td>
            <td *ngIf="col.field === 'maNVL'" style="display:none"></td>
            <td *ngIf="col.field === 'action'" class="col-action"></td>
            <td *ngIf="col.field !== 'stt' && col.field !== 'maNVL' && col.field !== 'action'"
                class="col-num"
                [class.col-result]="isResult(col.field)">
              {{sum($any(col.field))}}
            </td>
          </ng-container>
        </tr>
      </tbody>
    </table>

    <div class="no-data" *ngIf="filteredRows.length === 0 && !isLoading">
      <i class="material-icons">folder_open</i>
      <p>Chưa có dữ liệu. Hãy import file để bắt đầu.</p>
    </div>
  </div>

</div>
