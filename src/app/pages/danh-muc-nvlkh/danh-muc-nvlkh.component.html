<div class="dv-catalog-page">
  <div class="dv-catalog-header">
    <div>
      <h2>Danh mục NVLKH</h2>
      <p>Mã nguyên liệu → Khách hàng (hoặc "Shared" nếu dùng chung). Import từ Excel: cột A = Mã NVL, cột B = Khách hàng.</p>
    </div>
    <div class="dv-catalog-header__actions">
      <button type="button" class="dv-btn dv-btn--ghost" (click)="goToMenu()">
        <i class="material-icons">arrow_back</i> Về Menu
      </button>
      <button type="button" class="dv-btn dv-btn--ghost" (click)="downloadTemplate()">
        <i class="material-icons">download</i> Tải Template
      </button>
      <button type="button" class="dv-btn dv-btn--primary" (click)="importFromExcel()" [disabled]="isImporting"
              title="Import sẽ thay thế toàn bộ danh mục hiện tại bằng dữ liệu trong file">
        <i class="material-icons">file_upload</i> {{ isImporting ? 'Đang import...' : 'Import Excel (thay thế)' }}
      </button>
      <button type="button" class="dv-btn dv-btn--primary" (click)="loadEntries()" [disabled]="isLoading">
        <i class="material-icons">refresh</i> {{ isLoading ? 'Đang tải...' : 'Làm mới' }}
      </button>
    </div>
  </div>

  <div class="dv-catalog-filters">
    <label class="dv-search">
      Tìm mã NVL / khách hàng
      <input type="search" [(ngModel)]="searchText" (input)="onSearchChange()" placeholder="Nhập mã NVL hoặc tên khách hàng...">
    </label>
  </div>

  <div class="dv-catalog-empty" *ngIf="!isLoading && !filteredEntries.length">Chưa có dữ liệu — bấm Import Excel để thêm.</div>
  <div class="dv-catalog-loading" *ngIf="isLoading">Đang tải danh mục...</div>

  <table class="dv-catalog-table" *ngIf="!isLoading && filteredEntries.length">
    <thead>
      <tr>
        <th>Mã NVL</th>
        <th>Khách hàng</th>
        <th>Cập nhật</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of filteredEntries">
        <td>{{ row.materialCode }}</td>
        <td><span class="dv-size-badge" [class.dv-size-badge--shared]="row.customer.toLowerCase() === 'shared'">{{ row.customer }}</span></td>
        <td>{{ formatUpdatedAt(row) }}</td>
        <td class="dv-actions">
          <button type="button" class="dv-btn dv-btn--sm dv-btn--danger" (click)="deleteEntry(row)">Xóa</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
