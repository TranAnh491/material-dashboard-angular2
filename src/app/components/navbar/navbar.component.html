<nav class="navbar navbar-expand-lg navbar-transparent  navbar-absolute fixed-top"
     [class.navbar--inbound-pass-through]="isInboundAsmPage()"
     [class.navbar--dashboard-pass-through]="isDashboard()"
     [class.navbar--pd-pass-through]="isPdControlPage()"
     [class.navbar--qc-trace-pass-through]="isQcTraceabilityPage()">
    <div class="container-fluid">
        <div class="navbar-wrapper">
          <a class="navbar-brand" href="javascript:void(0)">{{getTitle()}}</a>
        </div>
        <div class="collapse navbar-collapse justify-content-end" id="navigation">
            <!-- ASM1/ASM2 + notifications + user: tắt trên navbar chung (mỗi tab tự có điều khiển / Menu có đăng xuất) -->
            <div class="asm-icons" *ngIf="shouldShowNavbarFactoryToolbar()">
                <button
                  type="button"
                  class="factory-chip factory-chip-asm1"
                  (click)="selectFactory('ASM1')"
                  [class.is-active]="selectedFactory === 'ASM1'"
                  title="Chọn ASM1"
                >
                    <i class="material-icons">factory</i>
                    <span class="asm-label">1</span>
                </button>
                <button
                  type="button"
                  class="factory-chip factory-chip-asm2"
                  (click)="selectFactory('ASM2')"
                  [class.is-active]="selectedFactory === 'ASM2'"
                  title="Chọn ASM2"
                >
                    <i class="material-icons">factory</i>
                    <span class="asm-label">2</span>
                </button>
            </div>
            <ul class="navbar-nav navbar-actions" *ngIf="shouldShowNavbarFactoryToolbar()">
                <li class="nav-item">
                    <app-notification-dropdown></app-notification-dropdown>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link user-profile-link" href="javascript:void(0)" id="userDropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <i class="material-icons">person</i>
                        <span *ngIf="currentUser" class="user-name">{{ currentUser.displayName || currentUser.email }}</span>
                        <p>
                            <span class="d-lg-none d-md-block">Account</span>
                        </p>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userDropdown">
                        <div class="dropdown-item" *ngIf="currentUser">
                            <strong>{{ currentUser.displayName || 'User' }}</strong><br>
                            <small>{{ currentUser.email }}</small>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="javascript:void(0)" (click)="signOut()">
                            <i class="material-icons">exit_to_app</i> Đăng xuất
                        </a>
                    </div>
                </li>
            </ul>
        </div>
        <!-- Home Button - bên phải thanh; ẩn ở Menu, Shipment (đã có sidebar), QC, Settings, RM Delivery, Inbound (có nút riêng) -->
        <button
          type="button"
          class="btn-home ms-2"
          (click)="goToMenu()"
          *ngIf="!isDashboard() && !isMenuPage() && !isShipmentPage() && !isQCPage() && !isSettingsPage() && !isRm1DeliveryPage() && !isInboundAsmPage() && !isPdControlPage()"
          title="Về Menu"
        >
          <i class="material-icons">home</i>
        </button>
    </div>
</nav>
