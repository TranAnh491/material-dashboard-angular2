<!doctype html>
<html lang="en">
<head>
  <base href="/" />
  <meta charset="utf-8" />
  <link rel="apple-touch-icon" sizes="76x76" href="./assets/img/logo.png" />
  <link rel="icon" type="image/png" href="./assets/img/logo.png" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <title>Airspeed Warehouse</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />

  <!-- Fonts and icons (preconnect để tăng tốc, không dùng rel=stylesheet để tránh Angular inline) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css" rel="stylesheet" />

  <!-- ✅ Nucleo Icons từ Argon Dashboard Pro -->
  <link href="https://demos.creative-tim.com/argon-dashboard/assets/vendor/nucleo/css/nucleo.css" rel="stylesheet" />

  <!-- Google Maps API (nếu bạn cần dùng bản đồ) -->
  <script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key=YOUR-KEY-HERE"></script>

  <script>window.global = window;</script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>

  <!-- Google Fonts loaded via JS để Angular CLI không cố inline (tránh lỗi ECONNRESET) -->
  <script>
    (function(){
      var l=document.createElement('link');
      l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap';
      document.head.appendChild(l);
      var l2=document.createElement('link');
      l2.rel='stylesheet';
      l2.href='https://fonts.googleapis.com/icon?family=Material+Icons';
      document.head.appendChild(l2);
    })();
  </script>
</head>

<body>
  <app-root>
    <div class="loader">
      <svg class="circular" viewBox="25 25 50 50">
        <circle class="path" cx="50" cy="50" r="20" fill="none" stroke-width="2" stroke-miterlimit="10" />
      </svg>
    </div>
  </app-root>

  <!-- Google API nếu bạn có dùng -->
  <script src="https://apis.google.com/js/api.js"></script>
  
  <!-- XLSX Library for Excel export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    // Debug XLSX loading
    window.addEventListener('load', function() {
      console.log('🔍 Checking XLSX library after page load...');
      console.log('window.XLSX:', window.XLSX);
      console.log('typeof XLSX:', typeof window.XLSX);
      if (window.XLSX) {
        console.log('✅ XLSX library loaded successfully');
      } else {
        console.log('❌ XLSX library not loaded');
      }
    });
  </script>
</body>
</html>
